<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 160" width="750" height="160" aria-label="NiskBuild wide wordmark on matte iron" role="img">
  <defs>
    <linearGradient id="wmWideMattePlate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c5248"/>
      <stop offset="100%" stop-color="#3a3530"/>
    </linearGradient>
    <linearGradient id="wmWideMatteNisk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5ebe0"/>
      <stop offset="100%" stop-color="#d49a5c"/>
    </linearGradient>
    <linearGradient id="wmWideMatteBuild" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b87333"/>
      <stop offset="50%" stop-color="#d49a5c"/>
      <stop offset="100%" stop-color="#d4a574"/>
